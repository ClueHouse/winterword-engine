<script>
(function () {
  const path = window.location.pathname.replace(/^\/+|\/+$/g, "");
  const reserved = new Set(["", "twenty26", "cgi"]);

  if (!path) {
    return;
  }

  if (reserved.has(path)) {
    return;
  }

  window.location.href = "/twenty26/?org=" + encodeURIComponent(path);
})();
</script>
