<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>WinterWord</title>
</head>
<body>
  <div id="app">Loading WinterWord…</div>

  <script>
    (async () => {
      try {
        const path = window.location.pathname;
        const slug = path.replace(/^\/+|\/+$/g, "").toLowerCase();

        if (!slug) {
          document.getElementById("app").innerText = "Missing slug.";
          return;
        }

        const res = await fetch("/api/bootstrap", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ slug })
        });

        const data = await res.json();

        if (!data.ok) {
          document.getElementById("app").innerText = "Invalid game.";
          return;
        }

        const script = document.createElement("script");
        script.src = data.entry;
        script.onload = () => console.log("Engine loaded");
        script.onerror = () => {
          document.getElementById("app").innerText = "Error loading game.";
        };

        document.body.appendChild(script);
      } catch (err) {
        document.getElementById("app").innerText = "Error loading game.";
      }
    })();
  </script>
</body>
</html>
