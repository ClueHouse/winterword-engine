<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>WinterWord</title>
</head>
<body>
  <div id="app">Loading WinterWord…</div>

  <script>
<script>
(async () => {
  try {
    const path = window.location.pathname;
    const slug = path.replace("/", "").toLowerCase();

    if (!slug) {
      document.body.innerHTML = "Missing slug.";
      return;
    }

    const res = await fetch("/api/bootstrap", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ slug })
    });

    const data = await res.json();

    if (!data.ok) {
      document.body.innerHTML = "Invalid game.";
      return;
    }

    const script = document.createElement("script");
    script.src = data.entry;
    script.onload = () => console.log("Engine loaded");
    script.onerror = () => {
      document.body.innerHTML = "Error loading game.";
    };

    document.body.innerHTML = "";
    document.body.appendChild(script);

  } catch (err) {
    document.body.innerHTML = "Error loading game.";
  }
})();
</script>
  </script>
</body>
</html>
