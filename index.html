<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const org = params.get("org");

  if (!org) {
    window.location.href = "/twenty26/base-station";
    return;
  }

  window.location.href = "/twenty26/base-station?org=" + encodeURIComponent(org);
})();
</script>
